source = /home/lunear/.cache/wal/colors-hyprland.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

background {
    monitor =
    path = $wallpaper
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.17
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $foreground
    font_size = 110
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 220
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = $color7
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 130
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =   $USER
    color = $foreground
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 5
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = $color6
    inner_color = rgba(13, 13, 31, 0.55)
    font_color = $foreground
    fade_on_empty = false
    placeholder_text = <span foreground="##909099"><i>Enter password</i></span>
    fail_text = <span foreground="##e87590">$FAIL ($ATTEMPTS)</span>
    check_color = $color13
    fail_color = $color14
    rounding = 14
    position = 0, -60
    halign = center
    valign = center
}
